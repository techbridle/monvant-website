  const [pastHero, setPastHero] = useState(false);
  const [showCookies, setShowCookies] = useState(false);

  const displayPhone = '+44 7874 450 385';

  const [touchStartY, setTouchStartY] = useState(null);

    const onScroll = () => { setScrolled(window.scrollY > 40); setPastHero(window.scrollY > window.innerHeight * 0.7); };

    `Journey: ${form.journey}`,
    `Vehicle: ${form.vehicle}`,
    `When: ${form.datetime || 'Flexible'}`,
    `Notes: ${form.requirements || '—'}`,

          <span className="text-lg font-serif tracking-[0.35em] text-white">MONVANT</span>

        </div>

                  <div className="absolute bottom-4 left-4 right-4 flex justify-between items-end">
                    <span className="text-[10px] uppercase tracking-[0.35em] text-[#C5A059]">{v.sub}</span>
                    <span className="text-[10px] uppercase tracking-[0.3em] text-white/70 inline-flex items-center gap-2 bg-black/40 backdrop-blur px-3 py-2">
                      Explore <ArrowUpRight size={12}/>
                    </span>
                  </div>
                </a>
                <div className="md:col-span-6 bg-[#101010] border border-white/5 p-7 md:p-9 flex flex-col">
                  <h3 className="font-serif text-white text-2xl md:text-3xl leading-tight">{v.name}</h3>
                  <p className="mt-4 text-white/60 font-light leading-relaxed">{v.pitch}</p>
                  <div className="mt-6 space-y-2">
                    <p className="text-[10px] uppercase tracking-[0.3em] text-[#C5A059]/80">Best for</p>
                    <ul className="space-y-1.5">
                      {v.best.map(b => (
                        <li key={b} className="text-white/70 text-[15px] flex items-center gap-3">
                          <span className="w-5 h-px bg-[#C5A059]/60"></span>{b}
                        </li>
                      ))}
                    </ul>
                  </div>
                  <div className="mt-auto pt-8 flex items-center gap-3">
                    <a href={v.page} className="flex-1 text-center py-4 border border-[#C5A059]/60 hover:bg-[#C5A059] hover:text-black text-[10px] uppercase tracking-[0.3em] text-[#C5A059] transition-all">
                      Vehicle page
                    </a>
                    <a href="#contact" className="flex-1 text-center py-4 bg-[#C5A059] hover:bg-white text-black text-[10px] uppercase tracking-[0.3em] transition-all">
                      Reserve
                    </a>
                  </div>
                </div>
              </article>
            ))}
          </div>

          {/* VIP interior mosaic — trimmed to 5 */}
          <div className="mt-20 pt-16 border-t border-white/5">
            <div className="mb-10">
              <span className="text-[10px] uppercase tracking-[0.4em] text-[#C5A059]">V-Class · VIP specification</span>
              <div className="hair mt-4 mb-6 w-24"></div>
              <h3 className="font-serif text-white text-3xl md:text-4xl leading-tight max-w-3xl">A cabin designed to <span className="italic">quiet</span> the world outside.</h3>
            </div>
            <div className="grid grid-cols-12 auto-rows-[140px] md:auto-rows-[180px] gap-3">
              <button onClick={() => setLightbox({ src: vipGallery[0].src, caption: vipGallery[0].c })} className="col-span-12 md:col-span-8 row-span-3 relative overflow-hidden group bg-[#0c0c0c]">
                <img src={vipGallery[0].src} alt={vipGallery[0].c} className="absolute inset-0 w-full h-full object-cover transition-transform duration-[1400ms] group-hover:scale-105" />
                <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-60 group-hover:opacity-90 transition-opacity"></div>
                <div className="absolute left-4 right-4 bottom-3 text-[9px] uppercase tracking-[0.3em] text-white/80 text-left">{vipGallery[0].c}</div>
              </button>
              <button onClick={() => setLightbox({ src: vipGallery[1].src, caption: vipGallery[1].c })} className="col-span-6 md:col-span-4 row-span-2 relative overflow-hidden group bg-[#0c0c0c]">
                <img src={vipGallery[1].src} alt={vipGallery[1].c} className="absolute inset-0 w-full h-full object-cover transition-transform duration-[1400ms] group-hover:scale-105" />
                <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-60"></div>
                <div className="absolute left-4 right-4 bottom-3 text-[9px] uppercase tracking-[0.3em] text-white/80 text-left">{vipGallery[1].c}</div>
              </button>
              <button onClick={() => setLightbox({ src: vipGallery[2].src, caption: vipGallery[2].c })} className="col-span-6 md:col-span-4 row-span-1 relative overflow-hidden group bg-[#0c0c0c]">
                <img src={vipGallery[2].src} alt={vipGallery[2].c} className="absolute inset-0 w-full h-full object-cover transition-transform duration-[1400ms] group-hover:scale-105" />
                <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-60"></div>
                <div className="absolute left-4 right-4 bottom-3 text-[9px] uppercase tracking-[0.3em] text-white/80 text-left">{vipGallery[2].c}</div>
              </button>
              <button onClick={() => setLightbox({ src: vipGallery[3].src, caption: vipGallery[3].c })} className="col-span-6 md:col-span-6 row-span-2 relative overflow-hidden group bg-[#0c0c0c]">
                <img src={vipGallery[3].src} alt={vipGallery[3].c} className="absolute inset-0 w-full h-full object-cover transition-transform duration-[1400ms] group-hover:scale-105" />
                <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-60"></div>
                <div className="absolute left-4 right-4 bottom-3 text-[9px] uppercase tracking-[0.3em] text-white/80 text-left">{vipGallery[3].c}</div>
              </button>
              <button onClick={() => setLightbox({ src: vipGallery[4].src, caption: vipGallery[4].c })} className="col-span-6 md:col-span-6 row-span-2 relative overflow-hidden group bg-[#0c0c0c]">
                <img src={vipGallery[4].src} alt={vipGallery[4].c} className="absolute inset-0 w-full h-full object-cover transition-transform duration-[1400ms] group-hover:scale-105" />
                <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-60"></div>
                <div className="absolute left-4 right-4 bottom-3 text-[9px] uppercase tracking-[0.3em] text-white/80 text-left">{vipGallery[4].c}</div>
              </button>
            </div>
          </div>
        </div>
      </section>

      {/* COVERAGE */}
      <section id="coverage" className="py-28 md:py-36 px-6 md:px-10">
        <div className="max-w-[1120px] mx-auto">
          <div className="grid md:grid-cols-12 gap-10 mb-14 items-end">
            <div className="md:col-span-6">
              <span className="text-[10px] uppercase tracking-[0.4em] text-[#C5A059]">Coverage</span>
              <div className="hair mt-4 mb-8 w-24"></div>
              <h2 className="font-serif text-white text-4xl md:text-5xl leading-[1.05]">London. Every hour. Every postcode.</h2>
            </div>
            <div className="md:col-span-5 md:col-start-8">
              <p className="text-white/60 font-light leading-relaxed">
                Based in central London, we cover every borough, every major airport, and every private aviation terminal within the M25 — plus out-of-London runs on request.
              </p>
            </div>
          </div>

          <div className="grid md:grid-cols-12 gap-10">
            {/* Areas */}
            <div className="md:col-span-5">
              <p className="text-[10px] uppercase tracking-[0.3em] text-[#C5A059]/80 mb-5">Central & inner London</p>
              <div className="grid grid-cols-2 gap-y-3 gap-x-6">
                {coverageAreas.map(a => (
                  <span key={a} className="text-white/70 text-[15px] flex items-center gap-3">
                    <span className="w-1.5 h-1.5 bg-[#C5A059]/70 rounded-full"></span>{a}
                  </span>
                ))}
              </div>
            </div>
            {/* Airports */}
            <div className="md:col-span-7">
              <p className="text-[10px] uppercase tracking-[0.3em] text-[#C5A059]/80 mb-5">Airports & FBOs</p>
              <div className="border border-white/5">
                {airports.map((a, i) => (
                  <div key={a.code} className={`grid grid-cols-12 items-center px-5 py-4 ${i < airports.length-1 ? 'border-b border-white/5' : ''} hover:bg-white/[0.02] transition-colors`}>
                    <span className="col-span-2 font-serif text-[#C5A059] text-xl">{a.code}</span>
                    <span className="col-span-5 text-white text-[15px]">{a.name}</span>
                    <span className="col-span-5 text-right text-white/50 text-[13px] uppercase tracking-[0.15em]">{a.dist}</span>
                  </div>
                ))}
              </div>
              <p className="mt-4 text-[11px] text-white/40 uppercase tracking-[0.2em]">Journey times are indicative · Traffic & time of day vary</p>
            </div>
          </div>
        </div>
      </section>

      {/* TESTIMONIAL */}
      <section className="py-24 md:py-32 px-6 md:px-10 bg-[#0E0E0E] border-y border-white/5">
        <div className="max-w-[900px] mx-auto text-center">
          <span className="text-[10px] uppercase tracking-[0.4em] text-[#C5A059]">In their words</span>
          <div className="hair mt-4 mb-10 w-24 mx-auto"></div>
          <p className="font-serif text-white text-2xl md:text-4xl leading-[1.2] italic">
            "I've used chauffeur firms on three continents. Monvant is the only one where I've never once had to think about the car. That's the whole point."
          </p>
          <div className="mt-8 flex items-center justify-center gap-4 text-[10px] uppercase tracking-[0.35em] text-white/55">
            <span className="w-8 h-px bg-[#C5A059]/50"></span>
            <span>M. Halvorsen · Financial Services · London</span>
            <span className="w-8 h-px bg-[#C5A059]/50"></span>
          </div>
        </div>
      </section>

      {/* CONTACT */}
      <section id="contact" className="py-28 md:py-36 px-6 md:px-10">
        <div className="max-w-[1360px] mx-auto">
          <div className="grid md:grid-cols-12 gap-12 md:gap-20">
            <div className="md:col-span-5">
              <span className="text-[10px] uppercase tracking-[0.4em] text-[#C5A059]">Book / Contact</span>
              <div className="hair mt-4 mb-8 w-24"></div>
              <h2 className="font-serif text-white text-4xl md:text-5xl leading-[1.05]">Ready when you are.</h2>
              <p className="mt-6 text-white/60 font-light leading-relaxed max-w-md">
                Form, phone, or WhatsApp — we'll confirm quickly and handle the rest. Response within the hour, typically much sooner.
              </p>
              <div className="mt-12 space-y-7">
                <a href={`tel:${whatsappDigits}`} className="group flex items-start gap-4">
                  <Phone className="text-[#C5A059] mt-1" size={18} />
                  <div>
                    <p className="text-[10px] uppercase tracking-[0.3em] text-white/40 mb-1">Direct line · 24/7</p>
                    <p className="text-xl text-white group-hover:text-[#C5A059] transition-colors font-light">{displayPhone}</p>
                  </div>
                </a>
                <a href={`mailto:${companyEmail}`} className="group flex items-start gap-4">
                  <Mail className="text-[#C5A059] mt-1" size={18} />
                  <div>
                    <p className="text-[10px] uppercase tracking-[0.3em] text-white/40 mb-1">Email</p>
                    <p className="text-xl text-white group-hover:text-[#C5A059] transition-colors font-light">{companyEmail}</p>
                  </div>
                </a>
                <button onClick={() => openWhatsApp('Hello Monvant')} className="group flex items-start gap-4 text-left w-full">
                  <MessageCircle className="text-[#C5A059] mt-1" size={18} />
                  <div>
                    <p className="text-[10px] uppercase tracking-[0.3em] text-white/40 mb-1">WhatsApp</p>
                    <p className="text-xl text-white group-hover:text-[#C5A059] transition-colors font-light">Message the concierge</p>
                  </div>
                </button>
              </div>
            </div>
            <form onSubmit={(e)=>{e.preventDefault(); openWhatsApp(inquiryText);}} className="md:col-span-6 md:col-start-7 space-y-8">
              <div className="grid sm:grid-cols-2 gap-6">
                <Field label="Full name"><input required value={form.fullName} onChange={(e) => setForm({ ...form, fullName: e.target.value })} className="monv-input" /></Field>
                <Field label="Contact · Phone or email"><input required value={form.contact} onChange={(e) => setForm({ ...form, contact: e.target.value })} className="monv-input" /></Field>
              </div>
              <div className="grid sm:grid-cols-2 gap-6">
                <Field label="Journey type">
                  <select value={form.journey} onChange={(e) => setForm({ ...form, journey: e.target.value })} className="monv-input appearance-none pr-6">
                    {['Airport Transfer','Corporate Travel','Hotel Transfer','Hourly Hire','Private Jet / FBO','Event / Occasion'].map(o => <option key={o}>{o}</option>)}
                  </select>
                </Field>
                <Field label="Vehicle preference">
                  <select value={form.vehicle} onChange={(e) => setForm({ ...form, vehicle: e.target.value })} className="monv-input appearance-none pr-6">
                    {['S-Class','V-Class AMG Line','Range Rover Autobiography','No preference'].map(o => <option key={o}>{o}</option>)}
                  </select>
                </Field>
              </div>
              <Field label="Date & time (flexible)">
                <input type="text" placeholder="e.g. Thursday 14 May · 08:30 · LHR T5" value={form.datetime} onChange={(e) => setForm({ ...form, datetime: e.target.value })} className="monv-input" />
              </Field>
              <Field label="Notes">
                <textarea rows={3} value={form.requirements} onChange={(e) => setForm({ ...form, requirements: e.target.value })} className="monv-input resize-none" placeholder="Flight number · passenger count · special requests"></textarea>
              </Field>
              <button className="group w-full py-5 bg-[#C5A059] text-black font-medium uppercase tracking-[0.3em] text-[11px] hover:bg-white transition-all inline-flex items-center justify-center gap-3">
                Send booking request <ArrowRight size={14} className="group-hover:translate-x-1 transition-transform" />
              </button>
              <p className="text-center text-[10px] uppercase tracking-[0.3em] text-white/30">Opens WhatsApp · Reply within the hour</p>
            </form>
          </div>
        </div>
      </section>

      {/* FOOTER — simplified */}
      <footer className="py-14 border-t border-white/5">
        <div className="max-w-[1360px] mx-auto px-6 md:px-10 flex flex-col md:flex-row justify-between items-center gap-8">
          <div className="flex items-center gap-3">
            <Monogram size={32} />
            <div className="flex flex-col leading-none">
              <span className="text-lg font-serif tracking-[0.35em] text-white">MONVANT</span>
              <span className="text-[9px] tracking-[0.4em] text-[#C5A059]/80 mt-[5px] uppercase">Chauffeur · London</span>
            </div>
          </div>
          <div className="flex flex-col md:flex-row items-center gap-5 md:gap-10 text-[10px] uppercase tracking-[0.3em] text-white/50">
            <a href={`tel:${whatsappDigits}`} className="hover:text-white transition-colors">{displayPhone}</a>
            <a href={`mailto:${companyEmail}`} className="hover:text-white transition-colors">{companyEmail}</a>
            <span className="text-white/30">© {new Date().getFullYear()} Monvant</span>
          </div>
        </div>
      </footer>

      {/* MOBILE STICKY BOOK BAR */}
      <div className={`md:hidden fixed bottom-0 left-0 right-0 z-[70] bg-[#0B0B0B]/95 backdrop-blur border-t border-white/10 p-3 transition-transform duration-500 ${pastHero ? 'translate-y-0' : 'translate-y-full'}`}>
        <div className="flex gap-2">
          <button onClick={() => openWhatsApp('Hello Monvant, I would like to make a booking.')} className="flex-1 py-3.5 bg-[#C5A059] text-black text-[10px] uppercase tracking-[0.28em] font-medium inline-flex items-center justify-center gap-2">
            <MessageCircle size={14} /> WhatsApp now
          </button>
          <a href={`tel:${whatsappDigits}`} className="w-14 h-[46px] flex items-center justify-center border border-[#C5A059]/50 text-[#C5A059]">
            <Phone size={16} />
          </a>
        </div>
      </div>

      {/* LIGHTBOX */}
      {lightbox && (
        <div className="fixed inset-0 bg-black/95 backdrop-blur-sm z-[100] flex flex-col items-center justify-center p-6"
             onClick={() => setLightbox(null)}
             onTouchStart={(e) => setTouchStartY(e.touches[0].clientY)}
             onTouchEnd={(e) => { if (touchStartY && e.changedTouches[0].clientY - touchStartY > 80) setLightbox(null); }}>
          <button className="absolute top-6 right-6 text-white/70 hover:text-white p-2"><X size={28} /></button>
          <img src={lightbox.src} className="max-w-[90vw] max-h-[80vh] object-contain" alt="" />
          <p className="mt-6 text-[#C5A059] uppercase tracking-[0.4em] text-[10px]">{lightbox.caption}</p>
        </div>
      )}

      {showCookies && (
        <div className="fixed bottom-6 left-6 right-6 md:left-auto md:w-[380px] bg-[#0B0B0B] border border-white/10 p-6 z-[80] shadow-2xl">
          <p className="text-[10px] uppercase tracking-[0.3em] text-[#C5A059] mb-2">Cookies & Privacy</p>
          <p className="text-xs text-white/55 font-light leading-relaxed mb-4">Essential cookies only. For reservation and site security.</p>
          <button onClick={() => { localStorage.setItem('monvant_cookie_ok','1'); setShowCookies(false); }} className="w-full py-3 bg-white/5 hover:bg-[#C5A059] hover:text-black text-white text-[10px] uppercase tracking-[0.3em] transition-all">I Accept</button>
        </div>
      )}
    </div>
  );
};

const Field = ({ label, children }) => (
  <label className="block">
    <span className="block text-[9px] uppercase tracking-[0.3em] text-white/40 mb-2">{label}</span>
    {children}
  </label>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
